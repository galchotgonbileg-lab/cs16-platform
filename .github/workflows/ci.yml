name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Check deploy scripts
        run: |
          find deploy -type f -name "*.sh" -print0 | xargs -0 shellcheck

      - name: Check docker scripts
        run: |
          find docker -type f -name "*.sh" -print0 | xargs -0 shellcheck

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t cs16-platform \
            -f docker/Dockerfile \
            .